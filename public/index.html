<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบทำจ่ายค่าแรงพนักงานพาร์ทไทม์</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121210;
      --card: #1C1C1A;
      --accent: #C5A059;
      --text-main: #E5E5E0;
      --text-sub: #8E8E88;
      --border: #2D2D2A;
      --input-bg: #242422;
    }
    body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text-main); padding: 40px 20px; line-height: 1.6; font-size: 16px; }
    
    /* ขยายความกว้างสูงสุดให้เต็มจอมากขึ้นเพื่อลดการเบียดของตาราง */
    .container { max-width: 95%; margin: auto; background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    
    h3 { font-weight: 400; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; margin-bottom: 25px; font-size: 24px; }
    
    .tab-menu { display: flex; gap: 40px; margin-bottom: 40px; border-bottom: 1px solid var(--border); }
    .tab-btn { background: none; border: none; padding: 15px 5px; color: var(--text-sub); cursor: pointer; font-size: 18px; transition: 0.3s; position: relative; font-family: 'Kanit', sans-serif; }
    .tab-btn.active { color: var(--accent); font-weight: 400; }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
    label { font-size: 14px; color: var(--accent); margin-bottom: 8px; display: block; opacity: 0.9; }
    
    input, select { background: var(--input-bg); border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: var(--text-main); width: 100%; box-sizing: border-box; font-family: 'Kanit', sans-serif; font-size: 15px; }
    
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(68%) sepia(36%) saturate(542%) hue-rotate(1deg) brightness(92%) contrast(88%);
      cursor: pointer;
      transform: scale(1.3);
    }

    button { border: none; padding: 16px 30px; border-radius: 6px; cursor: pointer; font-family: 'Kanit', sans-serif; font-size: 16px; transition: 0.3s; }
    .btn-save { background: var(--accent); color: #121210; width: 100%; font-weight: 500; }
    .btn-save:hover { background: #D6B67A; transform: translateY(-1px); }
    .btn-del { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; font-size: 12px; padding: 5px 10px; border-radius: 4px; }
    
    .table-responsive { overflow-x: auto; margin-top: 30px; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; background: transparent; white-space: nowrap; } /* white-space: nowrap ป้องกันตัวหนังสือตัดบรรทัด */
    th { border-bottom: 1px solid var(--border); padding: 15px 12px; text-align: left; font-size: 14px; color: var(--accent); font-weight: 400; background: rgba(197, 160, 89, 0.05); }
    td { padding: 15px 12px; border-bottom: 1px solid #262624; font-size: 14px; color: #CCC; }
    tr:hover td { color: var(--text-main); background: #222220; }
    
    .header-box { border: 1px solid var(--border); padding: 30px; text-align: center; margin-bottom: 30px; background: var(--input-bg); border-radius: 8px; }
  </style>
</head>
<body>

<div class="container">
  <div class="tab-menu">
    <button class="tab-btn active" onclick="switchTab('tab-employee', this)">ข้อมูลพนักงาน</button>
    <button class="tab-btn" onclick="switchTab('tab-daily', this)">บันทึกงานรายวัน</button>
    <button class="tab-btn" onclick="switchTab('tab-summary', this)">สรุปยอดเงิน</button>
  </div>

  <div id="tab-employee" class="tab-content">
    <h3>ลงทะเบียนพนักงาน</h3>
    <div class="grid">
      <div><label>รหัสพนักงาน</label><input type="text" id="emp_id" placeholder="เช่น 001"></div>
      <div style="grid-column: span 2;"><label>ชื่อ-นามสกุล</label><input type="text" id="fullname"></div>
      <div>
        <label>ธนาคาร</label>
        <select id="bank_name">
          <option value="กสิกรไทย">กสิกรไทย</option>
          <option value="จ่ายนอกระบบ">จ่ายนอกระบบ</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>
      <div><label>เลขบัญชีธนาคาร</label><input type="text" id="bank_acc"></div>
      <div><label>เลขบัตรประชาชน</label><input type="text" id="id_card"></div>
      <div style="grid-column: span 3;"><label>ที่อยู่ตามทะเบียนบ้าน</label><input type="text" id="address"></div>
    </div>
    <button class="btn-save" onclick="saveEmployee()">บันทึกข้อมูลพนักงาน</button>
    
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>รหัส</th>
            <th>ชื่อ-นามสกุล</th>
            <th>ธนาคาร</th>
            <th>เลขบัญชี</th>
            <th>บัตรประชาชน</th>
            <th>ที่อยู่ตามทะเบียนบ้าน</th> </tr>
        </thead>
        <tbody id="emp_tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-daily" class="tab-content" style="display:none;">
    <div class="header-box">
      <h3>วันที่บันทึก: <input type="date" id="record_date" onchange="loadDaily()" style="width:auto; border:none; background:transparent; color:var(--accent); cursor:pointer; font-size: 22px; font-weight: bold;"></h3>
    </div>
    <div class="grid">
      <div><label>รหัสพนักงาน (กด Enter)</label><input type="text" id="daily_id" onkeydown="if(event.key==='Enter') fetchName()"></div>
      <div><label>ชื่อ (ดึงอัตโนมัติ)</label><input type="text" id="daily_name" disabled style="opacity: 0.6;"></div>
      <div><label>ร้าน</label><select id="daily_branch"><option>บ้านเพื่อนรัชโยธิน</option><option>Close Friend</option></select></div>
      <div><label>ตำแหน่งงาน</label>
        <select id="position">
          <option>Reception / Ticket</option><option>All Area</option><option>บาร์น้ำ</option><option>บาร์เทนเดอร์</option>
          <option>แคชเชียร์</option><option>บริการลูกค้า</option><option>เสิร์ฟร่วม</option><option>เด็กรับของ&ดูแลร้าน</option>
          <option>แม่บ้าน</option><option>ล้างจาน</option><option>Technical</option><option>Influ</option>
          <option>ออกของบาร์</option><option>ครัว</option><option value="other">อื่น ๆ (โปรดระบุ)</option>
        </select>
      </div>
      <div><label>เรทรายวัน</label><input type="number" id="rate" value="0"></div>
      <div><label>จำนวนวันทำงาน</label><input type="number" id="work_days" value="1" step="0.5"></div>
      <div><label>ค่าคอมมิชชั่น</label><input type="number" id="comm" value="0"></div>
      <div><label>มาสาย (บาท)</label><input type="number" id="d_absent" value="0"></div>
      <div><label>หักค่าเสื้อ/สายคล้องคอ</label><input type="number" id="d_uniform" value="0"></div>
      <div><label>หมายเหตุ</label>
        <select id="note_select"><option value="">ไม่มี</option><option>ค่าเก็บอ้วก</option><option value="other">อื่น ๆ</option></select>
      </div>
    </div>
    <button class="btn-save" onclick="saveDaily()">บันทึกรายการประจำวัน</button>
    <div class="table-responsive">
      <table>
        <thead><tr><th>ร้าน</th><th>ตำแหน่ง</th><th>ชื่อ</th><th>เรท</th><th>ยอดหัก</th><th>ลบ</th></tr></thead>
        <tbody id="daily_tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-summary" class="tab-content" style="display:none;">
    <h3>สรุปยอดเงิน</h3>
    <div class="header-box">
      <div style="display:flex; gap:15px; justify-content:center; align-items:center; flex-wrap: wrap;">
        <select id="sum_branch" style="width:200px;"><option value="all">ทุกร้าน</option><option>บ้านเพื่อนรัชโยธิน</option><option>Close Friend</option></select>
        <input type="date" id="s_date" style="width:auto;"> <span style="color:var(--text-sub)">ถึง</span> <input type="date" id="e_date" style="width:auto;">
        <button class="btn-save" style="width:auto; margin:0; padding:12px 30px;" onclick="loadSummary()">แสดงข้อมูลสรุป</button>
        <button class="btn-save" style="width:auto; margin:0; padding:12px 30px; background:var(--text-sub); color:var(--bg);" onclick="exportCSV()">ดึงไฟล์ EXCEL</button>
      </div>
    </div>
    <div class="table-responsive">
      <table id="summary_table">
        <thead>
          <tr>
            <th>No.</th><th>รหัส</th><th>ชื่อ-นามสกุล</th><th>วันทำ</th><th>วันละ</th><th>ค่าคอมมิชชั่น</th>
            <th>หักมาสาย</th><th>หักค่าเสื้อ</th><th>รายได้รวม</th><th>หักภาษี 3%</th><th>รายได้สุทธิ</th>
            <th>เลขบัญชี</th><th>ธนาคาร</th><th>บัตรประชาชน</th><th>ที่อยู่</th>
          </tr>
        </thead>
        <tbody id="summary_tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
    if(id === 'tab-employee') loadEmployees();
    if(id === 'tab-daily') { if(!document.getElementById('record_date').value) document.getElementById('record_date').valueAsDate = new Date(); loadDaily(); }
  }

  function fetchName() {
    const id = document.getElementById('daily_id').value;
    if(!id) return;
    fetch('/get-employee/'+id).then(res=>res.json()).then(data => {
      document.getElementById('daily_name').value = data.found ? data.fullname : "ไม่พบรหัส";
    });
  }

  function saveEmployee() {
    const p = {
      emp_id: document.getElementById('emp_id').value,
      fullname: document.getElementById('fullname').value,
      bank_name: document.getElementById('bank_name').value,
      bank_account: document.getElementById('bank_acc').value,
      id_card: document.getElementById('id_card').value,
      address: document.getElementById('address').value
    };
    if(!p.emp_id || !p.fullname) return alert("กรุณาระบุรหัสและชื่อ");
    fetch('/save-employee', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) }).then(() => { 
      loadEmployees(); 
      alert("บันทึกเรียบร้อย"); 
      document.getElementById('emp_id').value = ""; document.getElementById('fullname').value = "";
    });
  }

  function loadEmployees() {
    fetch('/list-employees').then(res=>res.json()).then(data => {
      data.sort((a, b) => a.emp_id.localeCompare(b.emp_id, undefined, {numeric: true}));
      const b = document.getElementById('emp_tbody'); b.innerHTML = '';
      data.forEach(r => b.innerHTML += `<tr><td>${r.emp_id}</td><td>${r.fullname}</td><td>${r.bank_name}</td><td>${r.bank_account}</td><td>${r.id_card}</td><td>${r.address || '-'}</td></tr>`);
    });
  }

  function saveDaily() {
    const p = {
      date: document.getElementById('record_date').value,
      emp_id: document.getElementById('daily_id').value,
      branch: document.getElementById('daily_branch').value,
      position: document.getElementById('position').value,
      work_days: parseFloat(document.getElementById('work_days').value) || 0,
      daily_rate: parseFloat(document.getElementById('rate').value) || 0,
      commission: parseFloat(document.getElementById('comm').value) || 0,
      deduct_absent: parseFloat(document.getElementById('d_absent').value) || 0,
      deduct_uniform: parseFloat(document.getElementById('d_uniform').value) || 0,
      note: document.getElementById('note_select').value
    };
    if(!p.emp_id) return alert("ระบุรหัสพนักงาน");
    fetch('/add-daily-record', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) }).then(() => { loadDaily(); alert("สำเร็จ"); });
  }

  function loadDaily() {
    fetch('/records-by-date/'+document.getElementById('record_date').value).then(res=>res.json()).then(data => {
      const b = document.getElementById('daily_tbody'); b.innerHTML = '';
      data.forEach(r => b.innerHTML += `<tr><td>${r.branch}</td><td>${r.position}</td><td>${r.fullname}</td><td>${r.daily_rate}</td><td>${r.total_deduct}</td><td><button class="btn-del" onclick="del(${r.id})">ลบ</button></td></tr>`);
    });
  }

  function del(id) { if(confirm("ลบใช่หรือไม่?")) fetch('/delete-record/'+id,{method:'DELETE'}).then(()=>loadDaily()); }

  function loadSummary() {
    const s = document.getElementById('s_date').value, e = document.getElementById('e_date').value, br = document.getElementById('sum_branch').value;
    if(!s || !e) return alert("เลือกวันที่");
    fetch(`/weekly-summary?start_date=${s}&end_date=${e}&branch=${br}`).then(res=>res.json()).then(data => {
      const b = document.getElementById('summary_tbody'); b.innerHTML = '';
      data.forEach((r, i) => {
        b.innerHTML += `<tr>
          <td>${i+1}</td><td>${r.emp_id}</td><td>${r.fullname}</td><td>${r.total_days}</td><td>${r.daily_rate}</td><td>${r.total_comm}</td>
          <td>${r.deduct_absent}</td><td>${r.deduct_uniform}</td><td style="color:var(--accent)">${(r.total_income||0).toLocaleString()}</td>
          <td style="color:#ff6b6b">${(r.tax||0).toLocaleString()}</td><td style="font-weight:500; color:#4CAF50">${(r.net_income||0).toLocaleString()}</td>
          <td>${r.bank_account}</td><td>${r.bank_name}</td><td>${r.id_card}</td><td>${r.address || '-'}</td>
        </tr>`;
      });
    });
  }

  function exportCSV() {
    const table = document.getElementById("summary_table");
    let csv = ["\ufeff"];
    for(let row of table.rows) {
      let r = [];
      for(let col of row.cells) r.push('"' + col.innerText.replace(/,/g,'') + '"');
      csv.push(r.join(","));
    }
    const blob = new Blob([csv.join("\n")], {type:'text/csv'});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "สรุปยอดเงิน.csv";
    a.click();
  }

  window.onload = loadEmployees;
</script>
</body>
</html>

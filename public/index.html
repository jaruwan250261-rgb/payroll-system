<script>
  let employeesData = [];

  // 🔴 ฟังก์ชัน Logout
  function logout() {
      if(confirm('ยืนยันการออกจากระบบ?')) {
          localStorage.removeItem('isLoggedIn');
          window.location.href = 'login.html';
      }
  }

  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
    if(id === 'tab-employee') loadEmployees();
  }

  // 🛡️ ฟังก์ชันโหลดข้อมูลพนักงานพร้อมระบบเรียงลำดับ
  function loadEmployees() {
    fetch('/list-employees')
      .then(res => res.json())
      .then(data => {
        // 🏆 เรียงลำดับตามรหัสพนักงาน (Numeric Sort)
        // เพื่อให้ 1, 2, 10 เรียงตามลำดับเลขจริง ไม่ใช่ตามตัวอักษร
        data.sort((a, b) => a.emp_id.localeCompare(b.emp_id, undefined, { numeric: true }));
        
        employeesData = data;
        const b = document.getElementById('emp_tbody'); 
        b.innerHTML = '';
        data.forEach(r => {
          b.innerHTML += `<tr>
            <td>${r.emp_id}</td>
            <td>${r.fullname}</td>
            <td>${r.bank_name}</td>
            <td>${r.bank_account}</td>
            <td>
              <button class="btn-del" onclick="deleteEmp('${r.emp_id}')">ลบ</button>
            </td>
          </tr>`;
        });
      });
  }

  function saveEmployee() {
    const p = {
      emp_id: document.getElementById('emp_id').value,
      fullname: document.getElementById('fullname').value,
      bank_name: document.getElementById('bank_name').value,
      bank_account: document.getElementById('bank_acc').value,
      id_card: document.getElementById('id_card').value,
      address: document.getElementById('address').value
    };
    if(!p.emp_id || !p.fullname) return alert("กรุณากรอกรหัสและชื่อพนักงาน");

    fetch('/save-employee', { 
      method:'POST', 
      headers:{'Content-Type':'application/json'}, 
      body:JSON.stringify(p) 
    }).then(() => { 
      alert("บันทึกข้อมูลเรียบร้อย"); 
      // ล้างค่าในฟอร์มหลังบันทึก
      document.getElementById('emp_id').value = "";
      document.getElementById('fullname').value = "";
      document.getElementById('bank_acc').value = "";
      document.getElementById('id_card').value = "";
      document.getElementById('address').value = "";
      loadEmployees(); 
    });
  }

  function deleteEmp(id) {
    if(confirm(`ยืนยันการลบพนักงานรหัส ${id}?`)) {
      fetch(`/delete-employee/${id}`, { method: 'DELETE' })
        .then(() => loadEmployees());
    }
  }

  // โหลดข้อมูลเมื่อเปิดหน้าครั้งแรก (ถ้า Login แล้ว)
  window.onload = () => {
    if (localStorage.getItem('isLoggedIn') === 'true') {
        loadEmployees();
    }
  };
</script>

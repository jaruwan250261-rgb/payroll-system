<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเงินเดือน - ออนไลน์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-custom { border-radius: 10px; }
    </style>
</head>
<body class="container py-4">
    <h2 class="text-center mb-4">ระบบบันทึกรายวัน & สรุปเงินเดือน</h2>

    <div class="row g-3">
        <div class="col-md-5">
            <div class="card p-3 mb-3">
                <h5>บันทึก/แก้ไขข้อมูลพนักงาน</h5>
                <div class="mb-2">
                    <label>รหัสพนักงาน (ID):</label>
                    <input type="text" id="emp_id" class="form-control" placeholder="เช่น F01" onchange="checkEmployee()">
                </div>
                <div id="emp_details">
                    <input type="text" id="fullname" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
                    <input type="text" id="bank_account" class="form-control mb-2" placeholder="เลขบัญชี">
                    <input type="text" id="bank_name" class="form-control mb-2" placeholder="ธนาคาร">
                    <button class="btn btn-primary w-100 btn-custom" onclick="saveEmployee()">บันทึกข้อมูลพนักงาน</button>
                </div>
            </div>

            <div class="card p-3">
                <h5>บันทึกการทำงานรายวัน</h5>
                <input type="date" id="work_date" class="form-control mb-2">
                <select id="branch" class="form-select mb-2">
                    <option value="บ้านเพื่อน">บ้านเพื่อน (Baan Puen)</option>
                    <option value="Close Friend">Close Friend</option>
                </select>
                <input type="text" id="position" class="form-control mb-2" placeholder="ตำแหน่ง">
                <div class="row g-2 mb-2">
                    <div class="col"><input type="number" id="daily_rate" class="form-control" placeholder="เรทรายวัน"></div>
                    <div class="col"><input type="number" id="work_days" class="form-control" value="1" step="0.5"></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col"><input type="number" id="commission" class="form-control" placeholder="ค่าคอม"></div>
                    <div class="col"><input type="number" id="deduct_absent" class="form-control" placeholder="หักขาด/สาย"></div>
                </div>
                <input type="text" id="note" class="form-control mb-2" placeholder="หมายเหตุ">
                <button class="btn btn-success w-100 btn-custom" onclick="saveDailyRecord()">บันทึกรายวัน</button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-3">
                <h5>สรุปยอดจ่ายเงินเดือน</h5>
                <div class="row g-2 mb-3">
                    <div class="col"><input type="date" id="start_date" class="form-control"></div>
                    <div class="col"><input type="date" id="end_date" class="form-control"></div>
                    <div class="col">
                        <select id="filter_branch" class="form-select">
                            <option value="all">ทุกสาขา</option>
                            <option value="บ้านเพื่อน">บ้านเพื่อน</option>
                            <option value="Close Friend">Close Friend</option>
                        </select>
                    </div>
                    <div class="col-auto"><button class="btn btn-info text-white" onclick="loadSummary()">ดึงข้อมูล</button></div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mt-2">
                        <thead>
                            <tr>
                                <th>ชื่อ</th>
                                <th>วัน</th>
                                <th>คอม</th>
                                <th>หัก</th>
                                <th>ยอดสุทธิ</th>
                            </tr>
                        </thead>
                        <tbody id="summary_table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันเช็คชื่อพนักงานอัตโนมัติ
        async function checkEmployee() {
            const id = document.getElementById('emp_id').value;
            if (!id) return;
            const res = await fetch(`/get-employee/${id}`); // 👈 แก้ให้เป็น URL ส่วนกลางแล้ว
            const data = await res.json();
            if (data.found) {
                document.getElementById('fullname').value = data.fullname;
                document.getElementById('bank_account').value = data.bank_account;
                document.getElementById('bank_name').value = data.bank_name;
                document.getElementById('daily_rate').value = data.daily_rate || "";
            }
        }

        // บันทึกพนักงาน
        async function saveEmployee() {
            const data = {
                emp_id: document.getElementById('emp_id').value,
                fullname: document.getElementById('fullname').value,
                bank_account: document.getElementById('bank_account').value,
                bank_name: document.getElementById('bank_name').value
            };
            const res = await fetch('/save-employee', { // 👈 แก้เป็น URL ส่วนกลาง
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert(await res.text());
        }

        // บันทึกรายวัน
        async function saveDailyRecord() {
            const data = {
                emp_id: document.getElementById('emp_id').value,
                date: document.getElementById('work_date').value,
                branch: document.getElementById('branch').value,
                position: document.getElementById('position').value,
                daily_rate: parseFloat(document.getElementById('daily_rate').value) || 0,
                work_days: parseFloat(document.getElementById('work_days').value) || 0,
                commission: parseFloat(document.getElementById('commission').value) || 0,
                deduct_absent: parseFloat(document.getElementById('deduct_absent').value) || 0,
                note: document.getElementById('note').value
            };
            const res = await fetch('/add-daily-record', { // 👈 แก้เป็น URL ส่วนกลาง
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert(await res.text());
        }

        // ดึงสรุปยอด
        async function loadSummary() {
            const start = document.getElementById('start_date').value;
            const end = document.getElementById('end_date').value;
            const branch = document.getElementById('filter_branch').value;
            
            const res = await fetch(`/weekly-summary?start_date=${start}&end_date=${end}&branch=${branch}`); // 👈 แก้เป็น URL ส่วนกลาง
            const data = await res.json();
            
            const tbody = document.getElementById('summary_table');
            tbody.innerHTML = '';
            data.forEach(item => {
                const row = `<tr>
                    <td>${item.fullname}<br><small class="text-muted">${item.bank_account} (${item.bank_name})</small></td>
                    <td>${item.total_days}</td>
                    <td>${item.total_comm}</td>
                    <td>${item.d_absent + item.d_uniform}</td>
                    <td class="fw-bold text-success">${item.net_income.toLocaleString()}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>

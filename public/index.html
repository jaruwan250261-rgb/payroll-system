<script>
    let employeesData = [];

    // 🔒 ฟังก์ชัน Logout
    async function logout() {
        if(confirm('ยืนยันออกจากระบบ?')) {
            await fetch('/api/logout', { method: 'POST' });
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
        if(id === 'tab-employee') loadEmployees();
        if(id === 'tab-daily') { 
            if(!document.getElementById('record_date').value) document.getElementById('record_date').valueAsDate = new Date(); 
            loadDaily(); 
        }
    }

    // 🟢 โหลดข้อมูลพนักงาน
    function loadEmployees() {
        fetch('/api/list-employees').then(res => {
            if(res.status === 401) { window.location.href = 'login.html'; return; }
            return res.json();
        }).then(data => {
            if(!data || !Array.isArray(data)) return;
            data.sort((a,b) => a.emp_id.localeCompare(b.emp_id, undefined, {numeric:true}));
            employeesData = data;
            const b = document.getElementById('emp_tbody'); b.innerHTML = '';
            data.forEach(r => b.innerHTML += `<tr><td>${r.emp_id}</td><td>${r.fullname}</td><td>${r.bank_name}</td><td>${r.bank_account}</td><td>${r.address || '-'}</td><td><button class="btn-edit" onclick="editEmp('${r.emp_id}')">แก้ไข</button><button class="btn-del-mini" onclick="deleteEmp('${r.emp_id}')">ลบ</button></td></tr>`);
        });
    }

    function saveEmployee() {
        const p = { emp_id:document.getElementById('emp_id').value, fullname:document.getElementById('fullname').value, bank_name:document.getElementById('bank_name').value, bank_account:document.getElementById('bank_acc').value, id_card:document.getElementById('id_card').value, address:document.getElementById('address').value };
        fetch('/api/save-employee', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)}).then(() => { alert("บันทึกสำเร็จ"); loadEmployees(); });
    }

    function editEmp(id) {
        const emp = employeesData.find(e => e.emp_id === id);
        if(emp) { document.getElementById('emp_id').value = emp.emp_id; document.getElementById('fullname').value = emp.fullname; document.getElementById('bank_name').value = emp.bank_name; document.getElementById('bank_acc').value = emp.bank_account; document.getElementById('id_card').value = emp.id_card; document.getElementById('address').value = emp.address || ''; window.scrollTo(0,0); }
    }

    function deleteEmp(id) { if(confirm('ลบพนักงาน?')) fetch(`/api/delete-employee/${id}`,{method:'DELETE'}).then(()=>loadEmployees()); }

    function fetchName() {
        const id = document.getElementById('daily_id').value;
        fetch('/api/get-employee/'+id).then(res=>res.json()).then(data => { document.getElementById('daily_name').value = data.found ? data.fullname : "ไม่พบรหัส"; });
    }

    // 🟡 บันทึกรายวัน (แก้ไขเพื่อให้ตารางเด้งขึ้นมาทันที)
    async function saveDaily() {
        const p = { 
            date: document.getElementById('record_date').value, 
            emp_id: document.getElementById('daily_id').value, 
            position: document.getElementById('daily_position').value,
            branch: document.getElementById('daily_branch').value, 
            work_days: parseFloat(document.getElementById('work_days').value) || 0, 
            daily_rate: parseFloat(document.getElementById('rate').value) || 0, 
            commission: parseFloat(document.getElementById('comm').value) || 0, 
            deduct_absent: parseFloat(document.getElementById('d_absent').value) || 0, 
            deduct_uniform: parseFloat(document.getElementById('d_uniform').value) || 0 
        };

        if(!p.date || !p.emp_id) return alert("กรุณาเลือกวันที่และใส่รหัสพนักงาน");

        const response = await fetch('/api/add-daily-record', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(p)
        });

        if (response.ok) {
            alert("บันทึกงานสำเร็จ");
            loadDaily(); // ดึงข้อมูลมาโชว์ในตารางทันที
            document.getElementById('daily_id').value = "";
            document.getElementById('daily_name').value = "";
        } else {
            const err = await response.json();
            alert("บันทึกไม่สำเร็จ: " + (err.error || "ตรวจสอบชื่อคอลัมน์ใน DB"));
        }
    }

    function loadDaily() {
        const date = document.getElementById('record_date').value;
        if(!date) return;
        fetch('/api/records-by-date/' + date).then(res => res.json()).then(data => {
            const b = document.getElementById('daily_tbody'); b.innerHTML = '';
            if(!data || !Array.isArray(data)) return;
            data.forEach(r => b.innerHTML += `<tr><td>${r.emp_id}</td><td>${r.fullname}</td><td>${r.daily_rate}</td><td>${r.work_days}</td><td>${r.commission || 0}</td><td>${r.deduct_absent || 0}</td><td>${r.deduct_uniform || 0}</td><td>${(r.total_income || 0).toLocaleString()}</td><td class="text-right"><button class="btn-del-mini" onclick="delRec(${r.id})">ลบ</button></td></tr>`);
        });
    }

    function delRec(id) { if(confirm('ลบรายการ?')) fetch('/api/delete-record/'+id,{method:'DELETE'}).then(()=>loadDaily()); }

    // 🔵 สรุปยอดเงิน
    function loadSummary() {
        const s = document.getElementById('s_date').value, e = document.getElementById('e_date').value, br = document.getElementById('sum_branch').value;
        if(!s || !e) return alert("เลือกช่วงวันที่ก่อน");
        
        fetch(`/api/raw-records?start_date=${s}&end_date=${e}&branch=${br}`).then(res => {
            if(res.status === 401) { window.location.href = 'login.html'; return; }
            return res.json();
        }).then(data => {
            const b = document.getElementById('summary_tbody'); b.innerHTML = '';
            if(!data || !Array.isArray(data)) return;
            data.forEach((r, i) => {
                const tax = r.total_income * 0.03;
                const net = r.total_income - tax;
                b.innerHTML += `<tr>
                    <td>${i+1}</td><td>${r.emp_id}</td><td>${r.fullname}</td><td class="text-center">${r.work_days}</td>
                    <td class="text-right">${r.daily_rate.toLocaleString()}</td><td class="text-center">${r.date}</td>
                    <td class="text-right">${(r.deduct_absent || 0).toLocaleString()}</td><td class="text-right">${(r.deduct_uniform || 0).toLocaleString()}</td>
                    <td class="text-right">${(r.commission || 0).toLocaleString()}</td><td class="text-right">${(r.total_income || 0).toLocaleString()}</td>
                    <td class="text-right">${tax.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td class="text-right" style="color:#4CAF50; font-weight:bold">${net.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td>${r.bank_account}</td><td>${r.bank_name}</td><td>${r.id_card}</td><td>${r.address || '-'}</td>
                </tr>`;
            });
        });
    }

    function exportExcel() {
        const table = document.getElementById("summary_table");
        let csv = ["\ufeff"];
        for(let row of table.rows) {
            let r = [];
            for(let col of row.cells) r.push('"' + col.innerText.replace(/,/g,'') + '"');
            csv.push(r.join(","));
        }
        const blob = new Blob([csv.join("\n")], {type:'text/csv;charset=utf-8'});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `สรุปยอดเงิน_${document.getElementById('s_date').value}.csv`;
        a.click();
    }
    window.onload = () => { if (localStorage.getItem('isLoggedIn') === 'true') loadEmployees(); };
</script>

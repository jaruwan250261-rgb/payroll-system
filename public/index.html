<script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }
</script>
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบทำจ่ายค่าแรงพนักงานพาร์ทไทม์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121210; --card: #1C1C1A; --accent: #C5A059; --text-main: #E5E5E0;
            --text-sub: #8E8E88; --border: #2D2D2A; --input-bg: #242422;
        }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text-main); padding: 40px 20px; margin: 0; }
        .container { max-width: 98%; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h3 { color: var(--accent); text-transform: uppercase; margin-bottom: 25px; font-weight: 400; letter-spacing: 1px; }
        .tab-menu { display: flex; gap: 40px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 15px 5px; color: var(--text-sub); cursor: pointer; font-size: 18px; font-family: 'Kanit'; transition: 0.3s; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 13px; color: var(--accent); margin-bottom: 6px; display: block; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: var(--text-main); width: 100%; box-sizing: border-box; font-family: 'Kanit'; font-size: 14px; }
        button { border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-family: 'Kanit'; transition: 0.3s; font-size: 14px; }
        .btn-save { background: var(--accent); color: #121210; font-weight: 500; }
        .btn-excel { background: #28a745; color: white; margin-left: 10px; }
        .btn-logout { background: #ff4d4d; color: white; padding: 8px 15px; float: right; margin-top: -55px; font-size: 13px; }
        
        /* Table Styles */
        .table-responsive { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 13px; }
        th { padding: 12px 10px; text-align: left; color: var(--accent); background: rgba(197, 160, 89, 0.08); border-bottom: 1px solid var(--border); font-weight: 400; }
        td { padding: 12px 10px; border-bottom: 1px solid #262624; color: #CCC; vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.02); color: white; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        .header-box { border: 1px solid var(--border); padding: 20px; margin-bottom: 25px; background: var(--input-bg); border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-employee', this)">ข้อมูลพนักงาน</button>
        <button class="tab-btn" onclick="switchTab('tab-daily', this)">บันทึกงานรายวัน</button>
        <button class="tab-btn" onclick="switchTab('tab-summary', this)">สรุปยอดเงิน</button>
    </div>

    <div id="tab-employee" class="tab-content">
        <h3>ลงทะเบียนพนักงาน</h3>
        <div class="grid">
            <div><label>รหัสพนักงาน</label><input type="text" id="emp_id"></div>
            <div style="grid-column: span 2;"><label>ชื่อ-นามสกุล</label><input type="text" id="fullname"></div>
            <div><label>ธนาคาร</label><select id="bank_name"><option>กสิกรไทย</option><option>ไทยพาณิชย์</option><option>จ่ายนอกระบบ</option></select></div>
            <div><label>เลขบัญชี</label><input type="text" id="bank_acc"></div>
            <div><label>บัตรประชาชน</label><input type="text" id="id_card"></div>
            <div style="grid-column: span 3;"><label>ที่อยู่ตามทะเบียนบ้าน</label><input type="text" id="address"></div>
        </div>
        <button class="btn-save" style="width:100%" onclick="saveEmployee()">บันทึกข้อมูลพนักงาน</button>
        <div class="table-responsive">
            <table>
                <thead><tr><th>รหัส</th><th>ชื่อ</th><th>ธนาคาร</th><th>เลขบัญชี</th><th>จัดการ</th></tr></thead>
                <tbody id="emp_tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-daily" class="tab-content" style="display:none;">
        <div class="header-box">
            <h3>วันที่บันทึก: <input type="date" id="record_date" onchange="loadDaily()" style="width:auto; border:none; background:none; color:var(--accent); font-size:20px; cursor:pointer;"></h3>
        </div>
        <div class="grid">
            <div><label>รหัสพนักงาน (Enter)</label><input type="text" id="daily_id" onkeydown="if(event.key==='Enter') fetchName()"></div>
            <div><label>ชื่อ</label><input type="text" id="daily_name" disabled></div>
            <div><label>ร้าน</label><select id="daily_branch"><option>บ้านเพื่อนรัชโยธิน</option><option>Close Friend</option></select></div>
            <div><label>เรท/วัน</label><input type="number" id="rate" value="0"></div>
            <div><label>จำนวนวัน</label><input type="number" id="work_days" value="1" step="0.5"></div>
            <div><label>ค่าคอมฯ</label><input type="number" id="comm" value="0"></div>
            <div><label>มาสาย</label><input type="number" id="d_absent" value="0"></div>
            <div><label>หักเสื้อ/อื่นๆ</label><input type="number" id="d_uniform" value="0"></div>
        </div>
        <button class="btn-save" style="width:100%" onclick="saveDaily()">บันทึกรายการประจำวัน</button>
        <div class="table-responsive">
            <table>
                <thead><tr><th>ชื่อ</th><th>เรท</th><th>วันทำ</th><th>คอมฯ</th><th>หัก</th><th>รวม</th><th>ลบ</th></tr></thead>
                <tbody id="daily_tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-summary" class="tab-content" style="display:none;">
        <h3>สรุปยอดเงินรายสัปดาห์</h3>
        <div class="header-box">
            <div style="display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;">
                <input type="date" id="s_date" style="width:160px;"> ถึง <input type="date" id="e_date" style="width:160px;">
                <select id="sum_branch" style="width:180px;"><option value="all">ทุกสาขา</option><option>บ้านเพื่อนรัชโยธิน</option><option>Close Friend</option></select>
                <button class="btn-save" style="width:auto" onclick="loadSummary()">แสดงสรุปยอดเงิน</button>
                <button class="btn-excel" onclick="exportExcel()">ดึงไฟล์ EXCEL</button>
            </div>
        </div>
        <div class="table-responsive">
            <table id="summary_table">
                <thead>
                    <tr>
                        <th>No.</th><th>รหัส</th><th>ชื่อ-นามสกุล</th><th>วันทำ</th><th>วันละ</th><th>เพิ่มเติม</th>
                        <th>หักสาย</th><th>หักเสื้อ</th><th>คอมฯ</th><th>รายได้รวม</th><th>ภาษี 3%</th>
                        <th style="color:var(--accent)">สุทธิ</th><th>เลขบัญชี</th><th>ธนาคาร</th><th>เลขบัตร</th><th>ที่อยู่</th>
                    </tr>
                </thead>
                <tbody id="summary_tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let employeesData = [];

    function logout() { if(confirm('ออกจากระบบ?')) { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; } }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
        if(id === 'tab-employee') loadEmployees();
        if(id === 'tab-daily') { if(!document.getElementById('record_date').value) document.getElementById('record_date').valueAsDate = new Date(); loadDaily(); }
    }

    function loadEmployees() {
        fetch('/list-employees').then(res=>res.json()).then(data => {
            data.sort((a,b) => a.emp_id.localeCompare(b.emp_id, undefined, {numeric:true}));
            employeesData = data;
            const b = document.getElementById('emp_tbody'); b.innerHTML = '';
            data.forEach(r => b.innerHTML += `<tr><td>${r.emp_id}</td><td>${r.fullname}</td><td>${r.bank_name}</td><td>${r.bank_account}</td><td><button class="btn-del" onclick="deleteEmp('${r.emp_id}')">ลบ</button></td></tr>`);
        });
    }

    function saveEmployee() {
        const p = { emp_id:document.getElementById('emp_id').value, fullname:document.getElementById('fullname').value, bank_name:document.getElementById('bank_name').value, bank_account:document.getElementById('bank_acc').value, id_card:document.getElementById('id_card').value, address:document.getElementById('address').value };
        fetch('/save-employee',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(() => { alert("สำเร็จ"); loadEmployees(); });
    }

    function deleteEmp(id) { if(confirm('ลบ?')) fetch(`/delete-employee/${id}`,{method:'DELETE'}).then(()=>loadEmployees()); }

    function fetchName() {
        const id = document.getElementById('daily_id').value;
        fetch('/get-employee/'+id).then(res=>res.json()).then(data => { document.getElementById('daily_name').value = data.found ? data.fullname : "ไม่พบรหัส"; });
    }

    function saveDaily() {
        const p = { date:document.getElementById('record_date').value, emp_id:document.getElementById('daily_id').value, branch:document.getElementById('daily_branch').value, work_days:parseFloat(document.getElementById('work_days').value), daily_rate:parseFloat(document.getElementById('rate').value), commission:parseFloat(document.getElementById('comm').value), deduct_absent:parseFloat(document.getElementById('d_absent').value), deduct_uniform:parseFloat(document.getElementById('d_uniform').value) };
        fetch('/add-daily-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(() => { loadDaily(); alert("บันทึกสำเร็จ"); });
    }

    function loadDaily() {
        fetch('/records-by-date/'+document.getElementById('record_date').value).then(res=>res.json()).then(data => {
            const b = document.getElementById('daily_tbody'); b.innerHTML = '';
            data.forEach(r => b.innerHTML += `<tr><td>${r.fullname}</td><td>${r.daily_rate}</td><td>${r.work_days}</td><td>${r.commission}</td><td>${r.total_deduct}</td><td>${r.total_income}</td><td><button class="btn-del" onclick="delRec(${r.id})">ลบ</button></td></tr>`);
        });
    }

    function delRec(id) { if(confirm('ลบ?')) fetch('/delete-record/'+id,{method:'DELETE'}).then(()=>loadDaily()); }

    function loadSummary() {
        const s = document.getElementById('s_date').value, e = document.getElementById('e_date').value, br = document.getElementById('sum_branch').value;
        if(!s || !e) return alert("เลือกวันที่ก่อน");
        fetch(`/weekly-summary?start_date=${s}&end_date=${e}&branch=${br}`).then(res=>res.json()).then(data => {
            const b = document.getElementById('summary_tbody'); b.innerHTML = '';
            data.forEach((r, i) => {
                b.innerHTML += `<tr>
                    <td>${i+1}</td><td>${r.emp_id}</td><td>${r.fullname}</td><td class="text-center">${r.total_days}</td>
                    <td class="text-right">${r.daily_rate.toLocaleString()}</td><td class="text-center">-</td>
                    <td class="text-right">${r.deduct_absent.toLocaleString()}</td><td class="text-right">${r.deduct_uniform.toLocaleString()}</td>
                    <td class="text-right">${r.total_comm.toLocaleString()}</td><td class="text-right">${r.total_income.toLocaleString()}</td>
                    <td class="text-right">${r.tax.toLocaleString()}</td><td class="text-right" style="color:#4CAF50; font-weight:bold;">${r.net_income.toLocaleString()}</td>
                    <td>${r.bank_account}</td><td>${r.bank_name}</td><td>${r.id_card}</td><td>${r.address || '-'}</td>
                </tr>`;
            });
        });
    }

    function exportExcel() {
        const table = document.getElementById("summary_table");
        let csv = ["\ufeff"];
        for(let row of table.rows) {
            let r = [];
            for(let col of row.cells) r.push('"' + col.innerText.replace(/,/g,'') + '"');
            csv.push(r.join(","));
        }
        const blob = new Blob([csv.join("\n")], {type:'text/csv;charset=utf-8'});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `สรุปยอดเงิน_${document.getElementById('s_date').value}_ถึง_${document.getElementById('e_date').value}.csv`;
        a.click();
    }

    window.onload = () => { if (localStorage.getItem('isLoggedIn') === 'true') loadEmployees(); };
</script>
</body>
</html>
